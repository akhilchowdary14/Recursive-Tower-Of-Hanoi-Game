<!DOCTYPE html>
<html>
<head>
<title>Tower of Hanoi — Temple of Recursion</title>

<link rel="stylesheet" href="script.css">

<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="stars"></div>
<div class="mist"></div>

<!-- LOGIN -->
<div id="login">
  <div class="login-rune">🏛️</div>
  <h1>Tower of Hanoi</h1>
  <p class="login-sub">Temple of Recursion</p>

  <div class="tabs">
    <div class="active">Enter</div>
    <div>Inscribe</div>
  </div>

  <div class="input-group"><input placeholder="Your Name" /></div>
  <div class="input-group"><input placeholder="Scroll or Email" /></div>
  <div class="input-group"><input type="password" placeholder="Secret Cipher" /></div>

  <button class="start-btn" onclick="startGame()">Begin the Trial</button>
</div>


<!-- GAME -->
<div id="game">

<h1>Tower of Hanoi</h1>

<div class="top-bar">

Disks:
<button onclick="changeDisks(-1)">▼</button>
<span id="diskCountDisplay">3</span>
<button onclick="changeDisks(1)">▲</button>

Moves: <span id="moves">0</span>

<button onclick="resetGame()">Restart</button>
<button onclick="openReplay()">Replay</button>
<button onclick="autoSolve()">Solve!</button>

</div>

<div class="scene">

<div class="tower-wrap">
<div class="tower" id="tA"></div>
</div>

<div class="tower-wrap">
<div class="tower" id="tB"></div>
</div>

<div class="tower-wrap">
<div class="tower" id="tC"></div>
</div>

</div>

<div class="bottom-strip">
Minimum Moves: <span id="minMoves">7</span>
</div>

</div>


<script src="dsa.js"></script>
<script src="script.js"></script>

</body>
</html>
